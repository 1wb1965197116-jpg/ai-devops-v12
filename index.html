<!DOCTYPE html>
<html>
<head>
  <title>AI DevOps Pro v12</title>
</head>

<body style="background:#111;color:#fff;font-family:Arial;padding:20px;">

<h2>AI DevOps Pro System v12</h2>

<input id="project" placeholder="Project name (bb-ai-core)"
style="width:100%;padding:8px;margin-bottom:10px;">

<div>
  <button onclick="showTab('mongo')">Mongo</button>
  <button onclick="showTab('render')">Render</button>
  <button onclick="showTab('api')">API Keys</button>
</div>

<div id="mongo" class="tab">
  <h3>Mongo Config</h3>
  <textarea id="mongoInput" style="width:100%;height:100px;"></textarea>
</div>

<div id="render" class="tab" style="display:none;">
  <h3>Render Config</h3>
  <pre id="renderOutput"></pre>
</div>

<div id="api" class="tab" style="display:none;">
  <h3>API Keys</h3>
  <textarea id="apiInput" style="width:100%;height:100px;"></textarea>
</div>

<br>

<button onclick="analyze()">Analyze</button>
<button onclick="fix()">Fix</button>
<button onclick="build()">Build Project</button>

<h3>Status</h3>
<div id="status"></div>

<h3>Output</h3>
<pre id="output"></pre>

<script src="renderer.js"></script>

</body>
</html>
